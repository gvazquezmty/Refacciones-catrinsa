<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Mallas - CATRINSA</title>
    <style>
        /* Estilos alineados a la identidad de CATRINSA */
        /* Elaboro : Ing. Luis Gerardo Vazquez Carrier */
        /* Proyecto: Control de Almacenes CATRINSA */
        /* Actualizo: 17/05/2026 */

        :root { 
            --catrinsa-blue: #000080; 
            --catrinsa-gray: #8e8e8e; 
            --catrinsa-white: #ffffff; 
            --bg-body: #f4f7f6; 
            --alert-green: #2e7d32;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            padding: 20px; 
        }

        .container { max-width: 1200px; margin: auto; }
        
        header { 
            border-bottom: 4px solid var(--catrinsa-blue); 
            margin-bottom: 30px; 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 { color: var(--catrinsa-blue); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        #buscador { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 30px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s; 
        }

        #buscador:focus { 
            border-color: var(--catrinsa-blue); 
            box-shadow: 0 0 8px rgba(0,0,128,0.1); 
        }

        /* Grid de Tarjetas */
        .grid-mallas { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            transition: transform 0.3s; 
            border: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(0,0,128,0.15); 
        }
        
        .img-container { 
            width: 100%; 
            height: 180px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            box-sizing: border-box;
            border-bottom: 1px solid #f0f0f0;
        }

        .img-malla { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info { padding: 20px; flex-grow: 1; text-align: center; }
        
        .id-label { 
            font-size: 0.75rem; 
            color: var(--catrinsa-gray); 
            font-weight: bold; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }

        .tipo-malla { 
            font-size: 1.15rem; 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 10px; 
            display: block; 
            min-height: 42px; /* Mantiene la misma altura en textos de 1 o 2 renglones */
        }

        .especificaciones {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: left;
        }

        .linea-espec {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .linea-espec:last-child { margin-bottom: 0; }

        .abertura { 
            color: var(--catrinsa-blue); 
            font-weight: bold; 
        }
        
        .label-control {
            font-weight: 600;
            color: #555;
        }

        .loc-tag {
            color: #b71c1c;
            font-weight: bold;
        }

        .stock-tag {
            color: var(--alert-green);
            font-weight: bold;
        }
        
        .detalles-footer { 
            border-top: 1px solid #eee; 
            padding: 15px; 
            background: #fcfcfc; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .material-tag { 
            font-size: 0.8rem; 
            font-weight: bold; 
            color: #444; 
            text-transform: uppercase;
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-ver { 
            background: var(--catrinsa-blue); 
            color: white; 
            text-decoration: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-size: 0.85rem; 
            font-weight: bold; 
        }
    </style>
</head>

    function mostrarMallas() {
        const contenedor = document.getElementById('contenedorMallas');
        contenedor.innerHTML = mallas.map(malla => `
            <div class="card">
                <div class="img-container">
                    <img src="img/mallas/${malla.id}.jpg" class="img-malla" 
                         onerror="this.src='img/sin-foto.jpg'">
                </div>
                <div class="info">
                    <div class="id-label">ID: ${malla.id}</div>
                    <span class="tipo-malla">${malla.tipo}</span>
                    <div class="especificaciones">
                        <div class="linea-espec">
                            <span class="label-control">Luz (L):</span>
                            <span class="abertura">${malla.abertura}</span>
                        </div>
                        <div class="linea-espec">
                            <span class="label-control">Dimens:</span>
                            <span class="medida-malla">${malla.dimensiones}</span>
                        </div>
                        <div class="linea-espec" style="border-top: 1px dashed #ddd; margin-top: 6px; padding-top: 4px;">
                            <span class="label-control">Ubicación:</span>
                            <span class="loc-tag">${malla.loc}</span>
                        </div>
                        <div class="linea-espec">
                            <span class="label-control">Existencia:</span>
                            <span class="stock-tag">${malla.exist} Pzas</span>
                        </div>
                    </div>
                </div>
                <div class="detalles-footer">
                    <span class="material-tag" title="${malla.material}">${malla.material}</span>
                    <a href="img/mallas/${malla.id}.jpg" target="_blank" class="btn-ver">DETALLES</a>
                </div>
            </div>
        `).join('');
    }

    function filtrarMallas() {
        const busqueda = document.getElementById('buscador').value.toUpperCase();
        const cards = document.getElementsByClassName('card');
        
        for (let card of cards) {
            const texto = card.innerText.toUpperCase();
            card.style.display = texto.includes(busqueda) ? "" : "none";
        }
    }

    document.addEventListener('DOMContentLoaded', mostrarMallas);
</script>
